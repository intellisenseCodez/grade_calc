name: flask-app-test

services:

  # ─────────────────────────────────────────────
  # PostgreSQL — ephemeral test database
  # ─────────────────────────────────────────────
  db:
    image: postgres:16
    restart: no
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_db
    ports:
      - "5433:5432"          # non-default host port avoids conflicts with a local PG
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─────────────────────────────────────────────
  # Backend — Flask API under test
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: no
    environment:
      FLASK_ENV: testing
      DATABASE_URL: postgresql://test_user:test_password@db:5432/test_db
      SECRET_KEY: ci-test-secret-key
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:5000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    command: >
      sh -c "flask db upgrade && flask run --host=0.0.0.0 --port=5000"

  # ─────────────────────────────────────────────
  # Frontend — served for integration smoke tests
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: no
    environment:
      FLASK_ENV: testing
      BACKEND_URL: http://backend:5000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

networks:
  default:
    name: flask-test-network
